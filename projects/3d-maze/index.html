<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Maze</title>
<style>
body {
    margin: 0;
    background: black;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    height: 100vh;
}
#container {
    display: flex;
    gap: 16px;
}
canvas {
    border: 2px solid #444;
}
#statusRow {
    width: 816px;
    position: relative;
    margin-top: 12px;
}

#status {
    color: white;
    font-size: 18px;
    text-align: center;
    height: 24px;
    line-height: 24px;
}

.ui-button {
    position: absolute;
    right: 0;
    top: 0;
    font-size: 14px;
    padding: 6px 12px;
}

#topRow {
    width: 816px;              /* same as statusRow */
    display: flex;
    justify-content: space-between;
    margin-bottom: 6px;
    height: 32px;
    position: relative;
}

#topRow .spacer {
    width: 400px;              /* aligns dropdown above 2D */
}

#sizeSelect {
    font-size: 14px;
}

#changeSizeBtn {
    position: absolute;
    right: 0;
    top: 0;
}

.modal {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.6);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 1000;
}

.modal.hidden {
    display: none;
}

.modalContent {
    background: #222;
    color: white;
    padding: 20px 28px;
    border: 2px solid #555;
    min-width: 240px;
}

.modalButtons {
    display: flex;
    justify-content: flex-end;
    gap: 12px;
    margin-top: 16px;
}

  /* License MIT used in this file */
  #license {
      position: fixed;
      bottom: 8px;
      right: 12px;
      font-size: 11px;
      opacity: 0.5;
  }
  #license a {
      color: #aaaaaa;
      text-decoration: none;
  }
  #license a:hover {
      text-decoration: underline;
  }  
  /* License */

</style>
</head>
<body>

<div id="topRow">
    <div class="spacer"></div>
    <button id="changeSizeBtn" class="ui-button">Change Map Size...</button>
</div>
<div id="container">
    <canvas id="view3d" width="400" height="400"></canvas>
    <canvas id="view2d" width="400" height="400"></canvas>
</div>
<div id="statusRow">
    <div id="status"></div>
    <button id="resetBtn" class="ui-button" disabled>Reset Maze</button>
</div>

<div id="sizeModal" class="modal hidden">
    <div class="modalContent">
        <h3>Select Map Size</h3>

        <label>
            <input type="radio" name="mapSize" value="0">
            10 × 10
        </label><br>

        <label>
            <input type="radio" name="mapSize" value="1">
            16 × 16
        </label><br>

        <label>
            <input type="radio" name="mapSize" value="2">
            20 × 20
        </label>

        <div class="modalButtons">
            <button id="sizeOkBtn" disabled>OK</button>
            <button id="sizeCancelBtn">Cancel</button>
        </div>
    </div>
</div>

<script>
let SIZE;
let CELL;
const FOV = Math.PI / 3;
const RAYS = 200;
const DEFAULT_WALL_COLOR = { r:180, g:30, b:30 };
const MAX_LIGHT_DIST = 12;
const SIZE_OPTIONS = [10, 16, 20];
const CELL_OPTIONS = [40, 25, 20];
let sizeDropDownHasFocus = false;
let sizeIndex = 2;
let pendingSizeIndex = sizeIndex;
SIZE = SIZE_OPTIONS[sizeIndex];
CELL = CELL_OPTIONS[sizeIndex];

// Core state (allocated once)
const maze = [];
const wallColors = [];
const seen = [];

const player = {
    x: 0,
    y: 0,
    dir: 1,
    escaped: false
};

// Contexts
const ctx3 = view3d.getContext("2d");
const ctx2 = view2d.getContext("2d");
const statusEl = document.getElementById("status");
const resetBtn = document.getElementById("resetBtn");
const changeSizeBtn = document.getElementById("changeSizeBtn");
const sizeModal = document.getElementById("sizeModal");
const sizeOkBtn = document.getElementById("sizeOkBtn");
const sizeCancelBtn = document.getElementById("sizeCancelBtn");
const sizeRadios = document.querySelectorAll('input[name="mapSize"]');

// DFS maze generation
function dfs(x, y) {
    maze[y][x].visited = true;
    for (let d of [0,1,2,3].sort(()=>Math.random()-0.5)) {
        const nx = x + [0,1,0,-1][d];
        const ny = y + [-1,0,1,0][d];
        if (nx>=0 && ny>=0 && nx<SIZE && ny<SIZE && !maze[ny][nx].visited) {
            maze[y][x].walls[d] = 0;
            maze[ny][nx].walls[(d+2)%4] = 0;
            dfs(nx, ny);
        }
    }
}

/* ============================
   INIT / RESET GAME
   ============================ */
function initGame() {
    // Build maze + wall colors
    for (let y = 0; y < SIZE; y++) {
        maze[y] = [];
        wallColors[y] = [];
        seen[y] = [];
        for (let x = 0; x < SIZE; x++) {
            maze[y][x] = { visited:false, walls:[1,1,1,1] };
            wallColors[y][x] = [
                { ...DEFAULT_WALL_COLOR },
                { ...DEFAULT_WALL_COLOR },
                { ...DEFAULT_WALL_COLOR },
                { ...DEFAULT_WALL_COLOR }
            ];
            seen[y][x] = false;
        }
    }

    // Generate maze
    dfs(0, 0);

    // Exit walls (lower-right)
    wallColors[SIZE-1][SIZE-1][1] = { r:0, g:180, b:0 };
    wallColors[SIZE-1][SIZE-1][2] = { r:0, g:180, b:0 };

    // Reset player
    player.x = 0;
    player.y = 0;
    player.dir = 1;
    player.escaped = false;

    // UI reset
    statusEl.textContent = "";
    resetBtn.disabled = true;
}

/* ============================
   RAYCASTING
   ============================ */
function castRay(angle) {
    const sin = Math.sin(angle);
    const cos = Math.cos(angle);
    let prevX = player.x + 0.5;
    let prevY = player.y + 0.5;

    for (let t = 0; t < 20; t += 0.02) {
        const x = player.x + 0.5 + cos * t;
        const y = player.y + 0.5 + sin * t;
        const cx = Math.floor(x);
        const cy = Math.floor(y);

        if (cx < 0 || cy < 0 || cx >= SIZE || cy >= SIZE) {
            let wall;
            if (cx < 0) wall = 3;
            else if (cx >= SIZE) wall = 1;
            else if (cy < 0) wall = 0;
            else wall = 2;
            return { dist:t, cellX:Math.floor(prevX), cellY:Math.floor(prevY), wall };
        }

        const cell = maze[cy][cx];
        if (
            (cell.walls[0] && y < cy + 0.01) ||
            (cell.walls[2] && y > cy + 0.99) ||
            (cell.walls[3] && x < cx + 0.01) ||
            (cell.walls[1] && x > cx + 0.99)
        ) {
            return {
                dist:t,
                cellX:cx,
                cellY:cy,
                wall:(y<cy+0.01?0:y>cy+0.99?2:x<cx+0.01?3:1)
            };
        }

        seen[cy][cx] = true;
        prevX = x;
        prevY = y;
    }
    return { dist:20, cellX:0, cellY:0, wall:0 };
}

/* ============================
   DRAWING
   ============================ */
function draw3D() {
    ctx3.fillStyle = "#4fc3f7";
    ctx3.fillRect(0, 0, 400, 200);
    ctx3.fillStyle = "#2e7d32";
    ctx3.fillRect(0, 200, 400, 200);

    const baseAngle = player.dir * Math.PI / 2 - Math.PI / 2;

    for (let i = 0; i < RAYS; i++) {
        const angle = baseAngle + (i/RAYS - 0.5) * FOV;
        const hit = castRay(angle);
        const dist = Math.max(hit.dist, 0.0001);
        const h = 300 / dist;

        const light = Math.max(0, 1 - dist / MAX_LIGHT_DIST);
        const c = wallColors[hit.cellY][hit.cellX][hit.wall];

        ctx3.fillStyle = `rgb(${(c.r*light)|0},${(c.g*light)|0},${(c.b*light)|0})`;
        ctx3.fillRect(i*2, 200 - h/2, 2, h);
    }
}

function draw2D() {
    ctx2.fillStyle = "#2e7d32";
    ctx2.fillRect(0,0,400,400);
    ctx2.strokeStyle = "#b71c1c";
    ctx2.lineWidth = 2;

    for (let y=0;y<SIZE;y++) for (let x=0;x<SIZE;x++) {
        const px=x*CELL, py=y*CELL;
        if (!seen[y][x]) {
            ctx2.fillStyle = "#555";
            ctx2.fillRect(px,py,CELL,CELL);
            continue;
        }
        const w = maze[y][x].walls;
        if (x===SIZE-1 && y===SIZE-1) {
            if (w[0]) ctx2.beginPath(),ctx2.moveTo(px,py),ctx2.lineTo(px+CELL,py),ctx2.stroke();
            if (w[3]) ctx2.beginPath(),ctx2.moveTo(px,py),ctx2.lineTo(px,py+CELL),ctx2.stroke();
            continue;
        }
        if (w[0]) ctx2.beginPath(),ctx2.moveTo(px,py),ctx2.lineTo(px+CELL,py),ctx2.stroke();
        if (w[1]) ctx2.beginPath(),ctx2.moveTo(px+CELL,py),ctx2.lineTo(px+CELL,py+CELL),ctx2.stroke();
        if (w[2]) ctx2.beginPath(),ctx2.moveTo(px,py+CELL),ctx2.lineTo(px+CELL,py+CELL),ctx2.stroke();
        if (w[3]) ctx2.beginPath(),ctx2.moveTo(px,py),ctx2.lineTo(px,py+CELL),ctx2.stroke();
    }

    if (!player.escaped) {
        ctx2.save();
        ctx2.translate(player.x*CELL+CELL/2, player.y*CELL+CELL/2);
        ctx2.rotate(player.dir*Math.PI/2 - Math.PI/2);
        ctx2.fillStyle = "#aaa";
        ctx2.beginPath();
        ctx2.moveTo(8,0);
        ctx2.lineTo(-6,6);
        ctx2.lineTo(-6,-6);
        ctx2.fill();
        ctx2.restore();
    }
}

function syncSizeRadios() {
    sizeRadios.forEach(radio => {
        radio.checked = (Number(radio.value) === sizeIndex);
    });
}

function updateSizeOkButton() {
    sizeOkBtn.disabled = (pendingSizeIndex === sizeIndex);
}

/* ============================
   INPUT / LOOP
   ============================ */
document.addEventListener("keydown", e => {
    if (sizeDropDownHasFocus) return;
    if (player.escaped) return;
    if (e.key==="ArrowLeft") player.dir = (player.dir+3)%4;
    if (e.key==="ArrowRight") player.dir = (player.dir+1)%4;
    if (e.key==="ArrowUp") {
        const dx=[0,1,0,-1][player.dir];
        const dy=[-1,0,1,0][player.dir];
        if (!maze[player.y][player.x].walls[player.dir]) {
            player.x+=dx; player.y+=dy;
            if (player.x===SIZE-1 && player.y===SIZE-1) {
                player.escaped=true;
                statusEl.textContent="You Escaped!";
                resetBtn.disabled=false;
            }
        }
    }
});

changeSizeBtn.addEventListener("click", () => {
    pendingSizeIndex = sizeIndex;
    syncSizeRadios();
    updateSizeOkButton();
    sizeModal.classList.remove("hidden");
    changeSizeBtn.blur();
});

sizeRadios.forEach(radio => {
    radio.addEventListener("change", () => {
        pendingSizeIndex = Number(radio.value);
        updateSizeOkButton();
    });
});

sizeOkBtn.addEventListener("click", () => {
    sizeIndex = pendingSizeIndex;
    SIZE = SIZE_OPTIONS[sizeIndex];
    CELL = CELL_OPTIONS[sizeIndex];

    initGame();

    sizeModal.classList.add("hidden");
    sizeOkBtn.blur();
});

sizeCancelBtn.addEventListener("click", () => {
    sizeModal.classList.add("hidden");
    changeSizeBtn.blur();
});

sizeModal.addEventListener("click", (e) => {
    if (e.target === sizeModal) {
        sizeModal.classList.add("hidden");
        changeSizeBtn.blur();
    }
});

resetBtn.addEventListener("click", initGame);

function loop() {
    draw3D();
    draw2D();
    requestAnimationFrame(loop);
}

initGame();
loop();
</script>

<div id="license">
    <a href="../../LICENSE.txt">MIT License</a>
</div>

</body>
</html>
